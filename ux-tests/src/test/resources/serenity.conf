serenity {
    project.name = "PaqueTrack Screenplay UX - Fabrica Escuela 2026-1"
    take.screenshots = AFTER_EACH_STEP
    test.root = co.edu.udea.calidad.paquetrack.ui
    report {
        encoding = "UTF-8"
    }
    requirement {
        types = "feature"
    }
}

# Navegador: Chrome gestionado por Selenium Manager (descarga automatica del driver).
# headless.mode se puede sobreescribir con -Dheadless.mode=true (util en CI).
webdriver {
    driver = chrome
    autodownload = true
    capabilities {
        "goog:loggingPrefs" {
            browser = "ALL"
        }
    }
}
chrome.switches = "--start-maximized;--remote-allow-origins=*;--disable-notifications"
headless.mode = false

# Config de UI (NO quemada en el codigo). El front puede ir en un ambiente
# distinto al backend. Sobreescribible por .env (UI_BASEURL/UI_DELAY_MS) o -D...
# delay.ms: pausa "solo para observar" en vivo; 0 = productivo (sin sleeps).
ui {
    baseurl = "http://localhost:5173"
    delay.ms = 0
}
