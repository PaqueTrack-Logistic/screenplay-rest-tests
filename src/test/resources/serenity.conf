serenity {
    project.name = "PaqueTrack Screenplay REST - Fabrica Escuela 2026-1"
    take.screenshots = DISABLED
    test.root = co.edu.udea.calidad.paquetrack
    report {
        encoding = "UTF-8"
    }
    requirement {
        types = "feature"
    }
}

# URL base del API Gateway (punto de entrada unico a los microservicios PaqueTrack).
# NO se quema en el codigo: las Interactions/Tasks la leen desde aqui.
restapi {
    baseurl = "http://localhost:8088"
}

environments {
    default {
        restapi.baseurl = "http://localhost:8088"
    }
    local {
        restapi.baseurl = "http://localhost:8088"
    }
    docker {
        restapi.baseurl = "http://gateway-service:8080"
    }
}
